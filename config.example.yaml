# SynapS3 Configuration Example
# Environment overrides use the SYNAPS3_ prefix; common underscore-containing keys have explicit mappings.
# Shell-style placeholders such as ${VAR} are not expanded from YAML.
# e.g. SYNAPS3_SERVER_PORT=:9090

server:
  port: ":8080"
  max_connections: 250000   # max concurrent TCP connections (Fiber)
  max_requests: 100000      # max in-flight S3 requests (semaphore; excess gets 503 SlowDown)
  tls:
    enabled: false
    cert_file: ""
    key_file: ""

s3:
  access_key: "admin"
  secret_key: "password"
  region: "us-east-1"

filecoin:
  network: "calibration"       # calibration | mainnet
  rpc_url: "https://api.calibration.node.glif.io/rpc/v1"
  private_key: "0xREPLACE_WITH_YOUR_FILECOIN_PRIVATE_KEY"
  source: "synaps3"
  with_cdn: false                 # default CDN hint for synapse-go uploads
  allow_private_networks: false   # opt-in only for trusted private SP retrieval URLs

database:
  driver: "sqlite"             # postgres | sqlite
  # Omit dsn to use the default SQLite path under ~/.synaps3/db/.
  # dsn: "file:/absolute/path/to/synaps3.db?_pragma=journal_mode(WAL)&_pragma=busy_timeout(5000)"
  # dsn: "postgres://user:pass@localhost:5432/synaps3?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 5

cache:
  # Omit dir to use the default cache path under ~/.synaps3/cache/.
  # dir: "/absolute/path/to/cache"
  max_size_gb: 100
  eviction_policy: "lru"       # lru | manual | none

worker:
  upload:
    concurrency: 4
    poll_interval: "5s"
    max_retries: 5
  evictor:
    concurrency: 2
    poll_interval: "1m"
    max_retries: 3

logging:
  level: "info"                # debug | info | warn | error
  format: "json"               # json | text

admin:
  addr: "127.0.0.1:9090"       # admin HTTP server (healthz + metrics); bind externally only behind auth/proxy
