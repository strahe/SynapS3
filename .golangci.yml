version: "2"

linters:
  default: standard
  exclusions:
    paths:
      - ^versitygw/
      - ^synapse-sdk/
      - ^tmp/
      - ^cache/
      - ^ui/dist/

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      module-path: github.com/strahe/synaps3
  exclusions:
    paths:
      - ^versitygw/
      - ^synapse-sdk/
      - ^tmp/
      - ^cache/
      - ^ui/dist/
